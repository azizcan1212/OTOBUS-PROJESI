spring.application.name=occupancy.system

# ===== Veritabani =====
# Kullanici adi ve sifre ortam degiskeninden alinir
spring.datasource.url=jdbc:postgresql://localhost:5432/bus_information
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway sema migrasyonlarini yonetir — ddl-auto=validate sadece dogrular, degistirmez
spring.jpa.hibernate.ddl-auto=validate

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===== JWT =====
# Minimum 256-bit Base64 key zorunludur. Bos birakma!
# Uretmek icin: openssl rand -base64 32
jwt.secret=dGVzdEtleUZvckRldmVsb3BtZW50T25seVVzZUluUHJvZA==

# ===== Varsayilan kullanicilar (DataInitializer) =====
# Sadece kullanici DB'de yoksa (ilk kurulumda) kullanilir.
# Prod ortaminda .env uzerinden ADMIN_USERNAME/ADMIN_PASSWORD ve
# DEVICE_USERNAME/DEVICE_PASSWORD ile override edilmeli.
app.default-admin-username=${ADMIN_USERNAME:admin}
app.default-admin-password=${ADMIN_PASSWORD:Admin123!}
app.default-device-username=${DEVICE_USERNAME:device}
app.default-device-password=${DEVICE_PASSWORD:Device123!}

# ===== API =====
api.root=/api/v1

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ===== Resilience4j — Rate Limiter =====

# /api/v1/auth/login icin brute-force koruması
# 10 saniyede maksimum 5 istek; asimi halinde 429 Too Many Requests doner
resilience4j.ratelimiter.instances.loginRateLimiter.limit-for-period=5
resilience4j.ratelimiter.instances.loginRateLimiter.limit-refresh-period=10s
resilience4j.ratelimiter.instances.loginRateLimiter.timeout-duration=0s

# /api/v1/buses/{id}/occupancy icin cihaz guncellemesi koruması
# 1 saniyede maksimum 10 istek; IoT cihaz spam'ini engeller
resilience4j.ratelimiter.instances.occupancyRateLimiter.limit-for-period=10
resilience4j.ratelimiter.instances.occupancyRateLimiter.limit-refresh-period=1s
resilience4j.ratelimiter.instances.occupancyRateLimiter.timeout-duration=0s

# /api/v1/device/input icin tunel uzerinden gelen kamera/AI cihaz trafigi
# 1 saniyede maksimum 20 istek; asimi halinde 429 doner (nginx'te de ayni limit var)
resilience4j.ratelimiter.instances.deviceInputRateLimiter.limit-for-period=20
resilience4j.ratelimiter.instances.deviceInputRateLimiter.limit-refresh-period=1s
resilience4j.ratelimiter.instances.deviceInputRateLimiter.timeout-duration=0s
