# Backend container'ina internal DNS uzerinden proxy_pass yapmak icin.
# "backend" = docker-compose'daki servis adi, sadece private-network uzerinden erisilir.
resolver 127.0.0.11 valid=30s;

# Cihaz/AI girisi icin IP bazli rate limit (backend Resilience4j ile birlikte savunma derinligi)
limit_req_zone $binary_remote_addr zone=device_input_zone:10m rate=20r/s;
limit_req_status 429;

server {
    # Root yetkisi olmayan kullanici 1024 altindaki portlara bind edemez,
    # bu yuzden container icinde 8080 dinleniyor (compose'da disari istenen porta map edilir)
    listen 8080;
    # cloudflared, frontend ile network namespace paylasiyor (network_mode: service:frontend)
    # ve tunel konfigurasyonu localhost:8081 hedefliyor - bu yuzden 8081'i de dinliyoruz
    listen 8081;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip - statik dosyalari sikistirarak gonder
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ===== Backend'e internal proxy_pass (private-network uzerinden) =====
    set $backend_upstream http://backend:8080;

    # Cihaz/AI veri girisi - nginx katmaninda ek IP bazli rate limit (savunma derinligi)
    location = /api/v1/device/input {
        limit_req zone=device_input_zone burst=10 nodelay;

        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # REST API
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (canli doluluk yayini)
    location /ws/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Swagger / OpenAPI dokumantasyonu
    location ~ ^/(swagger-ui|v3/api-docs) {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Actuator health/info
    location /actuator/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== React Router (SPA) - bilinmeyen path'ler index.html'e dusmeli =====
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik asset'ler (js/css/img) - uzun sureli cache
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html cache'lenmesin - yeni deploy sonrasi tarayici eski versiyonu gostermesin
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
